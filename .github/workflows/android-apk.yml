name: Android APK

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew

      - name: Assemble debug + minified release APKs (legacy + modern)
        run: |
          ./gradlew \
            :app:assembleLegacyDebug :app:assembleModernDebug \
            :app:assembleLegacyRelease :app:assembleModernRelease \
            --stacktrace

      - name: Report APK sizes
        run: |
          echo "## APK sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK | Size | Notes |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          for f in app/build/outputs/apk/*/*/*.apk; do
            [ -f "$f" ] || continue
            size=$(du -h "$f" | cut -f1)
            bytes=$(wc -c < "$f" | tr -d ' ')
            name=$(basename "$f")
            note=""
            case "$name" in
              *legacy*) note="Older 32-bit ARM phones (armeabi-v7a)" ;;
              *modern*) note="Current 64-bit phones (arm64-v8a)" ;;
            esac
            echo "- \`$name\`: **$size** ($bytes bytes) — $note" | tee -a "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: routebot-debug-apks
          path: |
            android/app/build/outputs/apk/legacy/debug/*.apk
            android/app/build/outputs/apk/modern/debug/*.apk

      - name: Upload release APKs (unsigned if no keystore secrets)
        uses: actions/upload-artifact@v4
        with:
          name: routebot-release-apks
          path: |
            android/app/build/outputs/apk/legacy/release/*.apk
            android/app/build/outputs/apk/modern/release/*.apk
