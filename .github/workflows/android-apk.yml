name: Android APK

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew

      - name: Assemble debug + minified release APK
        run: ./gradlew :app:assembleDebug :app:assembleRelease --stacktrace

      - name: Report APK sizes
        run: |
          echo "## APK sizes" >> "$GITHUB_STEP_SUMMARY"
          for f in app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk; do
            [ -f "$f" ] || continue
            size=$(du -h "$f" | cut -f1)
            bytes=$(wc -c < "$f" | tr -d ' ')
            echo "- \`$(basename "$f")\`: **$size** ($bytes bytes)" | tee -a "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: routebot-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK (unsigned if no keystore secrets)
        uses: actions/upload-artifact@v4
        with:
          name: routebot-release-apk
          path: android/app/build/outputs/apk/release/*.apk
