name: Android Release

# Builds signed release APKs for legacy (32-bit) and modern (64-bit) devices plus
# a Play-style AAB, then publishes them to a GitHub Release.
#
# Trigger either by:
#   - Pushing a tag like `android-v1.2.3`, or
#   - Running this workflow manually ("Run workflow") with a version input.
#
# Required repository secrets (see docs/deployment.md "Android release signing"):
#   ANDROID_RELEASE_KEYSTORE_BASE64  base64-encoded .jks keystore file
#   ANDROID_KEYSTORE_PASSWORD        keystore password
#   ANDROID_KEY_ALIAS                key alias inside the keystore
#   ANDROID_KEY_PASSWORD             key password

on:
  push:
    tags:
      - "android-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew

      - name: Resolve release tag and version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="android-v${VERSION}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#android-v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$VERSION' is not in x.y.z format" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION (tag $TAG, versionCode base ${{ github.run_number }})"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_RELEASE_KEYSTORE_BASE64 secret — see docs/deployment.md" >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed legacy + modern release APKs and modern AAB
        env:
          ROUTEBOT_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ROUTEBOT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ROUTEBOT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ROUTEBOT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew \
            :app:assembleLegacyRelease \
            :app:assembleModernRelease \
            :app:bundleModernRelease \
            -ProutebotVersionName="${{ steps.version.outputs.version }}" \
            -ProutebotVersionCode="${{ github.run_number }}" \
            --stacktrace

      - name: Verify APK signatures
        run: |
          set -e
          shopt -s nullglob
          APKS=(
            app/build/outputs/apk/legacy/release/*.apk
            app/build/outputs/apk/modern/release/*.apk
          )
          if [ ${#APKS[@]} -eq 0 ]; then
            echo "No release APKs found" >&2
            exit 1
          fi
          for apk in "${APKS[@]}"; do
            echo "Verifying $apk"
            if command -v apksigner >/dev/null 2>&1; then
              apksigner verify "$apk"
            else
              "$ANDROID_HOME/build-tools"/*/apksigner verify "$apk" 2>/dev/null || {
                echo "apksigner not found; skipping explicit signature verification" >&2
              }
            fi
          done

      - name: Collect release artifacts
        run: |
          set -e
          mkdir -p release-artifacts
          VERSION="${{ steps.version.outputs.version }}"

          LEGACY_APK=$(ls app/build/outputs/apk/legacy/release/*.apk | head -n1)
          MODERN_APK=$(ls app/build/outputs/apk/modern/release/*.apk | head -n1)
          MODERN_AAB=$(ls app/build/outputs/bundle/modernRelease/*.aab | head -n1)

          cp "$LEGACY_APK" "release-artifacts/RouteBot-${VERSION}-legacy-armv7.apk"
          cp "$MODERN_APK" "release-artifacts/RouteBot-${VERSION}-modern-arm64.apk"
          cp "$MODERN_AAB" "release-artifacts/RouteBot-${VERSION}-modern.aab"

          echo "## Release artifact sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Who should install |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`RouteBot-${VERSION}-legacy-armv7.apk\` | Older 32-bit ARM phones |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`RouteBot-${VERSION}-modern-arm64.apk\` | Current 64-bit phones (recommended) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`RouteBot-${VERSION}-modern.aab\` | Play Console upload |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for f in release-artifacts/*; do
            size=$(du -h "$f" | cut -f1)
            bytes=$(wc -c < "$f" | tr -d ' ')
            echo "- \`$(basename "$f")\`: **$size** ($bytes bytes)" | tee -a "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: routebot-release-${{ steps.version.outputs.version }}
          path: android/release-artifacts/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          cat > "$NOTES_FILE" <<EOF
          ## Downloads
          - **modern-arm64** — recommended for current phones (64-bit ARM, Android 8+)
          - **legacy-armv7** — older 32-bit ARM phones (Android 8+)
          - **modern.aab** — upload to Play Console

          Both flavors target Android API 35 and share the same app features.
          EOF
          # Strip leading indentation from the heredoc body
          sed -i 's/^          //' "$NOTES_FILE"
          gh release create "${{ steps.version.outputs.tag }}" \
            "release-artifacts/RouteBot-${VERSION}-legacy-armv7.apk" \
            "release-artifacts/RouteBot-${VERSION}-modern-arm64.apk" \
            "release-artifacts/RouteBot-${VERSION}-modern.aab" \
            --title "RouteBot Android v${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --repo "${{ github.repository }}"
