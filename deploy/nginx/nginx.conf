worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Media uploads (audio/video/screenshots)
    client_max_body_size 64m;

    # Rate limit auth/enrollment endpoints against brute force / abuse.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_req_status 429;

    # Upstream API (Docker DNS)
    upstream routebot_api {
        server api:8080;
        keepalive 32;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Plain HTTP: only serve health checks; redirect everything else to HTTPS.
    server {
        listen 80;
        listen [::]:80;
        server_name gateway.routedns.io routedns.io _;

        location = /healthz {
            proxy_pass http://routebot_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name gateway.routedns.io routedns.io _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Rate-limited: login/register/refresh and QR enrollment claim.
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://routebot_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        location /api/v1/enrollment/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://routebot_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # WebSocket agent channel — long-lived connections.
        location /ws/ {
            proxy_pass http://routebot_api;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://routebot_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }
    }
}
