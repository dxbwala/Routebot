services:
  postgres:
    image: postgres:16-alpine
    container_name: routebot-postgres
    environment:
      POSTGRES_USER: routebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: routebot
    # Loopback-only: reachable for local tooling (psql, go test) but not on the
    # public network interface.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routebot -d routebot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: valkey/valkey:8-alpine
    container_name: routebot-redis
    command: ["valkey-server", "--requirepass", "${REDIS_PASSWORD}"]
    # Loopback-only: reachable for local tooling but not on the public network interface.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routebot-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      APP_PORT: "8080"
      MEDIA_STORAGE_PATH: /data/media
    # API is internal-only; public traffic goes through nginx.
    expose:
      - "8080"
    volumes:
      - mediadata:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: routebot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  mediadata:
